<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Search Global Trends | Ming Trends</title>
    <meta name="description" content="Search Ming Trends for global hot topics, overseas traffic sources, and English trend explainers.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://your-domain.com/search.html">
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html"><span class="brand-mark">MT</span><span>Ming Trends</span></a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
        <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
          <a href="index.html">Today</a>
          <a href="index.html#rankings">Rankings</a>
          <a href="sources.html">Source Guide</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>
    <main class="policy-page">
      <p class="eyebrow">Search</p>
      <h1>Search Global Trends</h1>
      <form class="newsletter-form search-form" role="search">
        <label for="q">Search topics or sources</label>
        <div>
          <input id="q" name="q" type="search" placeholder="Google Trends, Reddit, AI tools, gaming..." autocomplete="off">
          <button type="submit">Search</button>
        </div>
      </form>
      <section class="story-list search-results" aria-live="polite" aria-label="Search results"></section>
    </main>
    <footer class="site-footer">
      <div><a class="brand footer-brand" href="index.html"><span class="brand-mark">MT</span><span>Ming Trends</span></a><p>English hot lists and trend intelligence for global traffic sources.</p></div>
      <nav aria-label="Footer navigation"><a href="sources.html">Source Guide</a><a href="about.html">About</a><a href="editorial-policy.html">Editorial Policy</a><a href="privacy-policy.html">Privacy Policy</a><a href="terms.html">Terms</a><a href="contact.html">Contact</a></nav>
    </footer>
    <script>
      const entries = [
        {
          title: "Global Trend Sources Guide",
          category: "Source Guide",
          url: "sources.html",
          summary: "How Ming Trends adapts Google Trends, Reddit, YouTube, X, Hacker News, Product Hunt, GitHub, TikTok, Twitch, Steam, and more."
        },
        {
          title: "How Newsrooms Use AI Without Giving Up Editorial Control",
          category: "Technology",
          url: "articles/how-newsrooms-use-ai.html",
          summary: "Useful background for AI, media, and automation topics."
        },
        {
          title: "Practical Cybersecurity Habits for Remote Teams",
          category: "Security",
          url: "articles/remote-team-cybersecurity-habits.html",
          summary: "Evergreen context for security trends and breach explainers."
        },
        {
          title: "The Newsletter Renaissance Is About Trust, Not Nostalgia",
          category: "Media",
          url: "articles/newsletter-renaissance.html",
          summary: "Reader trust and direct distribution for media trend strategy."
        }
      ];

      const form = document.querySelector(".search-form");
      const input = document.querySelector("#q");
      const results = document.querySelector(".search-results");

      function render(query) {
        const normalized = query.trim().toLowerCase();
        const matches = normalized
          ? entries.filter((entry) =>
              [entry.title, entry.category, entry.summary].join(" ").toLowerCase().includes(normalized)
            )
          : entries;

        results.innerHTML = matches
          .map((entry) => `
            <article>
              <a href="${entry.url}">
                <span class="category">${entry.category}</span>
                <h3>${entry.title}</h3>
                <p>${entry.summary}</p>
              </a>
            </article>
          `)
          .join("");
      }

      const params = new URLSearchParams(window.location.search);
      input.value = params.get("q") || "";
      render(input.value);

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const url = new URL(window.location.href);
        url.searchParams.set("q", input.value);
        history.replaceState(null, "", url);
        render(input.value);
      });
    </script>
    <script src="assets/main.js" defer></script>
  </body>
</html>
